name: 🪂 Fly

on:
  # github.com/serverless-dns/blocklists/blob/6021f80f/.github/workflows/createUploadBlocklistFilter.yml#L4-L6
  schedule:
    # at 7:53 on 2nd, 9th, 17th, 25th of every month
    - cron: '53 7 2,9,17,25 * *'
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/fly.yml"
      - ".env.example"
      - ".eslintrc.cjs"
      - ".prettierignore"
      - "wrangler.toml"
      - "README.md"
      - "wrangler.toml"
      - ".vscode/*"
      - ".husky/*"
      - ".prettierrc.json"
      - "LICENSE"
      - "run"
  workflow_dispatch:
    inputs:
      git-ref:
        description: "Branch / ref / tag to build"
        required: false
        default: "main"
      deployment-type:
        description: "Fly app type to deploy to"
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod
        - onebox
        - flytls
      deployment-strat:
        description: "Deploy strategy"
        required: true
        default: 'rolling'
        type: choice
        options:
        - rolling
        - immediate
        - bluegreen
        - canary
      builder:
        description: "App builder type"
        required: true
        default: 'remote-only'
        type: choice
        options:
        - remote-only
        - local-only

env:
  GIT_REF: ${{ github.event.inputs.git-ref || github.ref }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  # one of immediate, rolling (default), bluegreen, canary
  FLY_DEPLOY_STRAT: ${{ github.event.inputs.deployment-strat }}
  # local-only, remote-only (default)
  FLY_BUILDER_TYPE: ${{ github.event.inputs.builder }}
  # default fly app to deploy to (typically, dev)
  FLY_APP: ${{ secrets.FLY_APP_NAME }}
  FLY_TLS_APP: ${{ secrets.FLY_APP_NAME }}
  FLY_PROD_ONEBOX_APP: ${{ secrets.FLY_APP_NAME }}
  FLY_PROD_APP: ${{ secrets.FLY_APP_NAME }}
  FLY_CFG: "fly.toml"
  FLY_TLS_CFG: "fly.tls.toml"
  FLY_DEPLOY_WAIT_SEC: "300"

jobs:
  deploy:
    name: 🚀 Deploy app
    runs-on: ubuntu-latest
    env: # 将 COMMIT_SHA 提升到作业级别
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.GIT_REF }}
          fetch-depth: 0

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 推荐根据项目package.json中的engines字段或实际需求调整Node.js版本

      - name: Install dependencies
        run: npm install --legacy-peer-deps # 添加依赖安装步骤，--legacy-peer-deps 可选，根据项目需要

      # 如果您的项目需要构建步骤（例如 Webpack 打包），请在此处添加
      # - name: Build project
      #   run: npm run build

      - name: 🏗 Setup env vars
        run: |
          echo "GIT_HEAD=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "FLY_TOML=${FLY_CFG}" >> $GITHUB_ENV
          echo "FLY_DEPLOY_STRAT=${FLY_DEPLOY_STRAT:-rolling}" >> $GITHUB_ENV
          echo "FLY_BUILDER_TYPE=${FLY_BUILDER_TYPE:-remote-only}" >> $GITHUB_ENV
        shell: bash

      - name: 🔐👨‍🚒 FlyTLS via dispatch?
        if: ${{ github.event_name == 'workflow_dispatch' &&
          github.event.inputs.deployment-type == 'flytls' }}
        run: |
          echo "FLY_APP=${{ env.FLY_TLS_APP }}" >> $GITHUB_ENV
          echo "FLY_TOML=${{ env.FLY_TLS_CFG }}" >> $GITHUB_ENV
          echo "::notice::Deploying FLYTLS / ${{ env.GIT_REF }} @ ${{ env.COMMIT_SHA }}"
        shell: bash

      - name: 🚨👨‍🚒 Prod via dispatch?
        if: ${{ github.event_name == 'workflow_dispatch' &&
          github.event.inputs.deployment-type == 'prod' }}
        run: |
          echo "FLY_APP=${{ env.FLY_PROD_APP }}" >> $GITHUB_ENV
          echo "::notice::Deploying PROD / ${{ env.GIT_REF }} @ ${{ env.COMMIT_SHA }}"
        shell: bash

      - name: 🚨🛺 Prod via tag?
        # docs.github.com/en/actions/learn-github-actions/contexts#github-context
        if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'tag' }}
        run: |
          echo "FLY_APP=${{ env.FLY_PROD_APP }}" >> $GITHUB_ENV
          echo "::notice::Deploying PROD / ${{ env.GIT_REF }} @ ${{ env.COMMIT_SHA }}"
        shell: bash

      - name: 🚨🌽 Prod via cron?
        if: github.event.schedule == '53 7 2,9,17,25 * *'
        run: |
          echo "FLY_APP=${{ env.FLY_PROD_APP }}" >> $GITHUB_ENV
          echo "::notice::Deploying PROD / ${{ env.GIT_REF }} @ ${{ env.COMMIT_SHA }}"
        shell: bash

      - name: 🚜👨‍🚒 Onebox via dispatch?
        if: ${{ github.event_name == 'workflow_dispatch' &&
          github.event.inputs.deployment-type == 'onebox' }}
        run: |
          echo "FLY_APP=${{ env.FLY_PROD_ONEBOX_APP }}" >> $GITHUB_ENV
          echo "::notice::Deploying 1BOX / ${{ env.GIT_REF }} @ ${{ env.COMMIT_SHA }}"
        shell: bash

      # experimental: github.com/superfly/flyctl-actions/pull/20
      - name: 🏗 Setup flyctl @ latest
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: latest

      - name: 🚢 Ship
        run: "flyctl deploy
            --${{ env.FLY_BUILDER_TYPE }}
            --image-label ${{ env.GIT_HEAD }}
            --config ${{ env.FLY_TOML }}
            --strategy ${{ env.FLY_DEPLOY_STRAT }}
            --wait-timeout ${{ env.FLY_DEPLOY_WAIT_SEC }}
            --auto-confirm
            --no-cache
            --verbose
            "
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }} # 确保 FLY_API_TOKEN 在 flyctl 命令执行时可用

      - name: 📕 Registry
        if: success()
        run: |
          echo "::notice::Image @ registry.fly.io/${{ env.FLY_APP }}:${{ env.GIT_HEAD }}"
        shell: bash
