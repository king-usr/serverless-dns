name: Deploy Serverless-DNS to Fly.io

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Check for lock files and install dependencies
      run: |
        echo "Checking for package managers..."
        if [ -f package-lock.json ]; then
          echo "Found package-lock.json, using npm ci"
          npm ci
        elif [ -f yarn.lock ]; then
          echo "Found yarn.lock, using yarn install"
          npm install -g yarn
          yarn install --frozen-lockfile
        elif [ -f pnpm-lock.yaml ]; then
          echo "Found pnpm-lock.yaml, using pnpm install"
          npm install -g pnpm
          pnpm install --frozen-lockfile
        else
          echo "No lock file found, using npm install"
          npm install
        fi
        
    - name: Build project (if build script exists)
      run: |
        if npm run | grep -q "build"; then
          echo "Build script found, running build..."
          npm run build
        else
          echo "No build script found, skipping build step"
        fi
      continue-on-error: true
      
    - name: Run tests (if test script exists)
      run: |
        if npm run | grep -q "test"; then
          echo "Test script found, running tests..."
          npm test
        else
          echo "No test script found, skipping test step"
        fi
      continue-on-error: true
      
    - name: Setup Fly.io CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
      
    - name: Deploy to Fly.io
      run: |
        APP_NAME="${{ secrets.FLY_APP_NAME }}"
        if [ -z "$APP_NAME" ]; then
          APP_NAME="serverless-dns-${{ github.run_number }}"
          echo "No FLY_APP_NAME secret found, using: $APP_NAME"
        fi
        
        if [ ! -f fly.toml ]; then
          echo "No fly.toml found, creating app and configuration..."
          flyctl launch --no-deploy --name "$APP_NAME" --region nrt
        else
          echo "fly.toml found, checking app name..."
          if ! grep -q "^app\s*=" fly.toml; then
            echo "Adding app name to fly.toml..."
            sed -i "1i app = \"$APP_NAME\"" fly.toml
          fi
        fi
        
        flyctl deploy --remote-only --app "$APP_NAME"
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        
    - name: Health check
      run: |
        APP_NAME="${{ secrets.FLY_APP_NAME }}"
        if [ -z "$APP_NAME" ]; then
          APP_NAME="serverless-dns-${{ github.run_number }}"
        fi
        
        sleep 30
        flyctl status --app "$APP_NAME"
        echo "Deployment completed!"
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
