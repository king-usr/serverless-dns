app = ""
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[services]]
  protocol = "udp"
  internal_port = 5053
  ports = [
    { port = 53 }
  ]

[[services]]
  protocol = "tcp"
  internal_port = 5054
  ports = [
    { port = 853 }  # DoT port
  ]

[metrics]
  port = 9091
  path = "/metrics"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[vm.mounts]]
  source = "data"
  destination = "/data"
