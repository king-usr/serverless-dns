# fly.toml for serverless-dns
# 请将 "my-serverless-dns" 替换为你的应用名称
app = ""
primary_region = "nrt"  # 东京区域，可改为 hkg(香港) 或 sin(新加坡)

[build]
  # 如果项目有 Dockerfile 就使用，否则使用 Node.js buildpack
  
[env]
  PORT = "8080"
  NODE_ENV = "production"
  # serverless-dns 可能需要的环境变量
  CF_BLOCKLIST_URL = ""
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

# DNS over HTTPS (DoH) 服务
[[services]]
  protocol = "tcp"
  internal_port = 8080
  ports = [
    { port = 80, handlers = ["http"] },
    { port = 443, handlers = ["tls", "http"] }
  ]

# DNS over TLS (DoT) 服务 - 如果项目支持
[[services]]
  protocol = "tcp"
  internal_port = 8053
  ports = [
    { port = 853 }  # Standard DoT port
  ]

# 传统 DNS (UDP) - 如果项目支持
[[services]]
  protocol = "udp"
  internal_port = 5053
  ports = [
    { port = 53 }
  ]

[vm]
  memory = "512mb"  # DNS 解析器可能需要更多内存
  cpu_kind = "shared"
  cpus = 1

# 如果需要持久化数据（如缓存或日志）
# [[vm.mounts]]
#   source = "serverless_dns_data"
#   destination = "/app/data"
